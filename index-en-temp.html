<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vela Resort อุ้มผาง ตาก | Hytte & Hus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --white: #FFFFFF;
            --off-white: #FAFAFA;
            --cream: #F5F5F0;
            --light-gray: #E5E7EB;
            --gray: #9CA3AF;
            --dark-gray: #4B5563;
            --charcoal: #1A1A1A;
            --yellow: #FFD700;
            --yellow-light: #FEF3C7;
            --text: #1A1A1A;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text); line-height: 1.6; }
        
        /* Language Switcher */
        .lang-switch { position: fixed; top: 1rem; right: 1rem; z-index: 1001; display: flex; gap: 0.5rem; }
        .lang-switch a { padding: 0.4rem 0.8rem; background: rgba(255,255,255,0.9); border-radius: 20px; font-size: 0.8rem; text-decoration: none; color: var(--charcoal); font-weight: 500; cursor: pointer; border: 2px solid transparent; transition: all 0.3s; }
        .lang-switch a:hover { border-color: var(--yellow); }
        .lang-switch a.active { background: var(--yellow); font-weight: 700; }
        
        /* Navigation */
        nav#navbar { position: fixed; top: 0; left: 0; width: 100%; padding: 1rem 3rem; display: flex; justify-content: center; align-items: center; z-index: 1000; transition: all 0.3s ease; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border-bottom: 2px solid #F3F4F6; }
        .logo { font-size: 1.25rem; font-weight: 800; color: #000000; text-decoration: none; letter-spacing: 0.1em; position: absolute; left: 3rem; }
        .nav-links { display: flex; gap: 2rem; list-style: none; margin: 0 auto; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
        .nav-link { font-size: 1rem; font-weight: 600; color: #1A1A1A; text-decoration: none; }
        .nav-link:hover { color: #FFD700; }
        .nav-desc { font-size: 0.75rem; color: #6B7280; font-weight: 400; }
        
        /* Hero */
        .hero { min-height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('hero-1.jpg') center 35%/cover no-repeat; z-index: -2; transition: background-image 0.5s ease-in-out; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.2) 40%, rgba(0,0,0,0.5) 100%); z-index: -1; }
        .hero-content { text-align: center; color: white; padding: 2rem; max-width: 700px; z-index: 1; }
        .hero-title { font-size: 4rem; font-weight: 800; margin-bottom: 0.5rem; text-shadow: 0 4px 30px rgba(0,0,0,0.5); letter-spacing: 0.15em; }
        .hero-subtitle { font-size: 1.25rem; color: rgba(255,255,255,0.9); margin-bottom: 0.5rem; }
        .hero-location { color: rgba(255,255,255,0.8); font-size: 1rem; margin-bottom: 1rem; letter-spacing: 0.1em; }
        
        /* Weather Widget */
        .weather-widget { position: absolute; top: 1.5rem; left: 1.5rem; display: flex; align-items: center; gap: 0.5rem; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; }
        .weather-icon { font-size: 1rem; }
        .weather-temp { font-size: 1rem; font-weight: 700; color: white; }
        .weather-location { font-size: 0.75rem; color: rgba(255,255,255,0.9); }
        
        /* Rating Badges */
        .rating-badges { position: absolute; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .rating-badge { background: rgba(255,255,255,0.95); color: var(--charcoal); padding: 0.5rem 1rem; border-radius: 25px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .brand-logo { width: 100px; height: 32px; display: block; }
        .rating-badge .score { background: #003580; color: white; padding: 0.25rem 0.5rem; border-radius: 8px; font-size: 0.9rem; }
        .rating-badge.booking .score { background: #003580; }
        .rating-badge.traveloka .score { background: #1ba0e2; }
        
        @media (max-width: 768px) {
            .weather-widget { top: 1rem; left: 1rem; padding: 0.4rem 0.8rem; font-size: 0.75rem; }
            .rating-badges { bottom: 1rem; right: 5rem; }
            #aiChatbotBtn { bottom: 1rem; left: 1rem; padding: 0.5rem 1rem; font-size: 0.9rem; }
            #aiChatbotWindow { bottom: 4rem; left: 1rem; width: 300px; }
        }
        .hero-cta { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 1rem 2.5rem; font-size: 1rem; font-weight: 600; text-decoration: none; border-radius: 50px; transition: all 0.3s ease; border: none; cursor: pointer; }
        .btn-primary { background: #FFD700; color: #000000; border: 2px solid #FFD700; }
        .btn-primary:hover { background: #FFFFFF; color: #FFD700; transform: translateY(-3px); box-shadow: 0 15px 40px rgba(255, 215, 0, 0.4); }
        .btn-outline { background: rgba(255,255,255,0.15); color: white; border: 2px solid rgba(255,255,255,0.4); backdrop-filter: blur(10px); }
        .btn-outline:hover { background: rgba(255,255,255,0.25); border-color: white; }
        
        .season-info { text-align: center; padding: 1rem; background: var(--yellow-light); border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--dark-gray); }
        
        /* Form */
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full { grid-column: span 2; }
        .form-group label { font-size: 0.9rem; color: var(--dark-gray); font-weight: 600; }
        .form-group input, .form-group select { padding: 1rem 1.25rem; border: 2px solid var(--light-gray); border-radius: 14px; font-size: 1rem; background: var(--white); transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 4px var(--yellow-light); }
        
        /* Price Display */
        .price-display { margin-top: 1rem; padding: 1rem; background: var(--off-white); border-radius: 12px; }
        .price-display h4 { font-size: 0.9rem; color: var(--gray); margin-bottom: 0.5rem; }
        .price-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--light-gray); }
        .price-row:last-child { border-bottom: none; font-weight: 700; color: var(--charcoal); font-size: 1.1rem; }
        
        /* Calendar Styles */
        .booking-calendar { margin-top: 1rem; padding: 1rem; background: #F9FAFB; border-radius: 12px; border: 2px solid #E5E7EB; }
        .calendar-title { font-size: 0.9rem; font-weight: 700; color: #1A1A1A; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .calendar-legend { display: flex; gap: 1rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .calendar-legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: #4B5563; }
        .calendar-legend-color { width: 12px; height: 12px; border-radius: 3px; }
        .calendar-legend-color.weekday { background: #D1FAE5; }
        .calendar-legend-color.weekend { background: #FEF3C7; }
        .calendar-legend-color.holiday { background: #FEE2E2; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.25rem; text-align: center; }
        .calendar-day-header { font-size: 0.7rem; font-weight: 600; color: #6B7280; padding: 0.25rem; text-transform: uppercase; }
        .calendar-day { padding: 0.5rem 0.25rem; border-radius: 6px; font-size: 0.75rem; font-weight: 500; position: relative; min-height: 50px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .calendar-day.weekday { background: #D1FAE5; color: #065F46; }
        .calendar-day.weekend { background: #FEF3C7; color: #92400E; }
        .calendar-day.holiday { background: #FEE2E2; color: #991B1B; font-weight: 700; }
        .calendar-day.selected { border: 2px solid #FFD700; }
        .calendar-day .date-num { display: block; font-weight: 600; }
        .calendar-day .room-count { display: block; font-size: 0.65rem; margin-top: 0.15rem; font-weight: 600; }
        
        /* Tour Selection */
        .tour-selection { margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--light-gray); }
        .tour-selection h4 { font-size: 1.1rem; color: var(--charcoal); margin-bottom: 1rem; font-weight: 700; }
        .tour-group-warning { background: #F3F4F6; border: 2px solid #E5E7EB; border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
        .tour-group-warning-title { display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; font-weight: 700; color: #1A1A1A; margin-bottom: 0.5rem; }
        .tour-group-warning-text { font-size: 0.85rem; color: #4B5563; line-height: 1.6; }
        .tour-options { display: grid; gap: 0.75rem; }
        .tour-option { display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; padding: 1.25rem; border: 2px solid var(--light-gray); border-radius: 14px; cursor: pointer; transition: all 0.3s; align-items: center; }
        .tour-option:hover { border-color: var(--yellow-light); background: var(--off-white); }
        .tour-option.selected { border-color: var(--yellow); background: var(--yellow-light); }
        .tour-option input[type="checkbox"] { width: 24px; height: 24px; accent-color: var(--yellow); cursor: pointer; }
        .tour-group-selector { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; min-width: 90px; }
        .tour-group-selector label { font-size: 0.75rem; color: var(--dark-gray); font-weight: 600; text-align: center; }
        .tour-group-selector select { padding: 0.5rem 0.4rem; border: 2px solid var(--light-gray); border-radius: 8px; font-size: 0.8rem; width: 100%; text-align: center; }
        .tour-info { flex: 1; }
        .tour-name { font-weight: 700; color: var(--charcoal); font-size: 1.05rem; }
        .tour-detail { font-size: 0.9rem; color: var(--gray); margin-top: 0.25rem; }
        .tour-price { font-weight: 800; color: var(--charcoal); font-size: 1.15rem; }
        .tour-price .unit { font-size: 0.85rem; color: var(--gray); font-weight: 400; }
        .tour-price-display { font-weight: 700; color: var(--charcoal); font-size: 1.1rem; min-width: 80px; text-align: right; }
        
        .total-box { margin-top: 2rem; padding: 1.5rem 2rem; background: var(--yellow-light); border-radius: 16px; display: flex; justify-content: space-between; align-items: center; }
        .total-box span:first-child { font-weight: 600; color: var(--charcoal); font-size: 1.1rem; }
        
        .submit-btn { width: 100%; padding: 1.25rem; background: #1A1A1A; color: white; border: 2px solid #1A1A1A; border-radius: 16px; font-size: 1.15rem; font-weight: 700; cursor: pointer; margin-top: 1.5rem; transition: all 0.3s; }
        .submit-btn:hover { background: #FFFFFF; color: #1A1A1A; transform: translateY(-2px); }
        
        /* Booking Modal */
        .booking-form-group { margin-bottom: 1.5rem; }
        .booking-form-group label { display: block; font-size: 0.95rem; color: var(--dark-gray); font-weight: 600; margin-bottom: 0.5rem; }
        .booking-form-group input, .booking-form-group select { width: 100%; padding: 0.875rem 1rem; border: 2px solid var(--light-gray); border-radius: 12px; font-size: 1rem; transition: all 0.3s; }
        .booking-form-group input:focus, .booking-form-group select:focus { outline: none; border-color: var(--yellow); box-shadow: 0 0 0 4px var(--yellow-light); }
        .booking-price-summary { background: var(--off-white); padding: 1.25rem; border-radius: 16px; margin-bottom: 1.5rem; }
        .booking-price-row { display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid var(--light-gray); font-size: 0.95rem; }
        .booking-price-row:last-child { border-bottom: none; font-weight: 700; font-size: 1.1rem; color: var(--charcoal); }
        .booking-submit-btn { width: 100%; padding: 1.125rem; background: #1A1A1A; color: white; border: 2px solid #1A1A1A; border-radius: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .booking-submit-btn:hover { background: #FFFFFF; color: #1A1A1A; transform: translateY(-2px); }
        
        /* Rooms Section */
        .rooms-section { padding: 6rem 2rem; background: var(--off-white); }
        .section-header { text-align: center; margin-bottom: 4rem; }
        .section-title { font-size: 2.5rem; font-weight: 700; color: #1A1A1A; margin-bottom: 1rem; }
        .section-subtitle { color: #4B5563; font-size: 1.1rem; max-width: 650px; margin: 0 auto; }
        
        .rooms-container { display: flex; max-width: 1400px; margin: 0 auto; gap: 2rem; }
        .room-side { flex: 1; display: flex; flex-direction: column; }
        @media (max-width: 1024px) { .rooms-container { flex-direction: column; } }
        
        .room-card { background: #FFFFFF; border: 2px solid #E5E7EB; border-radius: 24px; overflow: hidden; transition: all 0.3s; height: 100%; display: flex; flex-direction: column; }
        .room-card:hover { border-color: #FFD700; transform: translateY(-6px); box-shadow: 0 20px 60px rgba(255, 215, 0, 0.2); }
        
        .room-slideshow { position: relative; width: 100%; height: 450px; overflow: hidden; }
        .slideshow-container { display: flex; transition: transform 0.3s ease; width: 100%; height: 100%; }
        .slideshow-slide { min-width: 100%; height: 100%; }
        .slideshow-slide img { width: 100%; height: 100%; object-fit: cover; }
        .slideshow-nav { position: absolute; top: 50%; left: 0; right: 0; display: flex; justify-content: space-between; transform: translateY(-50%); padding: 0 1rem; }
        .slideshow-btn { background: rgba(255,255,255,0.8); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #1A1A1A; transition: all 0.3s; }
        .slideshow-btn:hover { background: #FFD700; color: #000000; }
        .slideshow-dots { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.5rem; }
        .slideshow-dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor: pointer; transition: all 0.3s; }
        .slideshow-dot.active { background: #FFD700; }
        
        .room-content { padding: 2rem; }
        
        /* Tour Add-on in Booking Modal */
        .tour-addon-section { 
            margin: 2rem 0; 
            padding: 1.5rem; 
            background: #F9FAFB; 
            border-radius: 12px; 
            border: 1px solid #E5E7EB; 
        }
        .tour-addon-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 1rem; 
        }
        .tour-addon-header h4 { 
            margin: 0; 
            font-size: 1.1rem; 
            color: #1A1A1A; 
        }
        .tour-toggle { 
            position: relative; 
            width: 50px; 
            height: 28px; 
        }
        .tour-toggle input { 
            opacity: 0; 
            width: 0; 
            height: 0; 
        }
        .toggle-slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #E5E7EB; 
            transition: .3s; 
            border-radius: 28px; 
        }
        .toggle-slider:before { 
            position: absolute; 
            content: ""; 
            height: 22px; 
            width: 22px; 
            left: 3px; 
            bottom: 3px; 
            background-color: white; 
            transition: .3s; 
            border-radius: 50%; 
        }
        input:checked + .toggle-slider { 
            background-color: #FFD700; 
        }
        input:checked + .toggle-slider:before { 
            transform: translateX(22px); 
        }
        .tour-price-display { 
            margin-top: 1rem; 
            padding: 1rem; 
            background: #FFFFFF; 
            border-radius: 8px; 
            border: 1px solid #E5E7EB; 
        }
        .tour-price-row { 
            display: flex; 
            justify-content: space-between; 
            font-size: 1rem; 
        }
        .tour-price-row span:last-child { 
            font-weight: 700; 
            color: #1A1A1A; 
        }
        
        .room-features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin: 1.5rem 0; padding: 1.5rem; background: #F9FAFB; border-radius: 12px; }
        .room-features span { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #4B5563; }
        .room-features i { color: #FFD700; font-size: 1rem; }
        
        .room-pricing { margin: 1.5rem 0; padding: 1.5rem; background: #F3F4F6; border-radius: 12px; border: 1px solid #E5E7EB; }
        .price-season { margin-bottom: 1rem; }
        .price-season:last-child { margin-bottom: 0; }
        .season-label { display: block; font-size: 0.9rem; font-weight: 700; color: #1A1A1A; margin-bottom: 0.75rem; }
        .price-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; font-size: 0.85rem; color: #4B5563; border-bottom: 1px solid #E5E7EB; }
        .price-row:last-child { border-bottom: none; }
        .price-row strong { color: #1A1A1A; font-size: 1rem; }
        
        .room-badge { display: inline-block; background: #F3F4F6; color: #1A1A1A; padding: 0.5rem 1rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600; margin-bottom: 1rem; }
        .room-badge.popular { background: #FFD700; color: #000000; }
        
        .room-name { font-size: 1.5rem; font-weight: 700; color: #1A1A1A; margin-bottom: 0.5rem; }
        .room-name span { font-size: 1rem; color: #6B7280; font-weight: 400; }
        
        .room-desc { color: #4B5563; margin-bottom: 1.5rem; line-height: 1.6; font-size: 1rem; }
        
        .room-price { font-size: 2rem; font-weight: 800; color: #1A1A1A; margin-bottom: 1.5rem; }
        .room-price span { font-size: 1rem; color: #6B7280; }
        
        .btn-primary { width: 100%; padding: 1rem; background: #FFD700; color: #000000; border: 2px solid #FFD700; border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn-primary:hover { background: #FFFFFF; color: #FFD700; }
        
        /* Gallery Section */
        .gallery-section { padding: 6rem 2rem; background: var(--white); }
        .gallery-tabs { display: flex; gap: 1rem; justify-content: center; margin-bottom: 2rem; }
        .gallery-tab { padding: 0.75rem 1.5rem; border: 2px solid #E5E7EB; background: #FFFFFF; border-radius: 25px; cursor: pointer; font-size: 0.95rem; font-weight: 500; transition: all 0.3s; }
        .gallery-tab.active { background: #FFD700; color: #000000; border-color: #FFD700; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; max-width: 1200px; margin: 0 auto; }
        .gallery-item { aspect-ratio: 4/3; background: var(--light-gray); border-radius: 16px; overflow: hidden; cursor: pointer; position: relative; transition: transform 0.3s; }
        .gallery-item:hover { transform: scale(1.02); }
        .gallery-item img { width: 100%; height: 100%; object-fit: contain; }
        .gallery-item.video::after { content: '▶'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.5rem; }
        .gallery-item.large { grid-column: span 2; grid-row: span 2; }
        
        /* Doi Hua Mot Slideshow */
        .doi-section { padding: 4rem 2rem; margin: 3rem 0; background: #FFFFFF; }
        .doi-container { max-width: 1200px; margin: 0 auto; }
        .doi-header { text-align: center; margin-bottom: 2rem; }
        .doi-title { font-size: 2.5rem; font-weight: 800; color: #1A1A1A; margin-bottom: 0.5rem; }
        .doi-subtitle { color: #4B5563; font-size: 1.1rem; }
        .doi-slideshow { position: relative; height: 500px; border-radius: 24px; overflow: hidden; box-shadow: 0 25px 80px rgba(0, 0, 0, 0.1); margin-bottom: 2rem; }
        .doi-slides { display: flex; transition: transform 1s ease-in-out; height: 100%; }
        .doi-slide { min-width: 100%; height: 100%; position: relative; }
        .doi-slide img { width: 100%; height: 100%; object-fit: contain; }
        .doi-nav { position: absolute; top: 50%; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 2rem; transform: translateY(-50%); }
        .doi-btn { width: 50px; height: 50px; background: rgba(255,255,255,0.95); border: none; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .doi-btn:hover { background: white; transform: scale(1.15); box-shadow: 0 6px 25px rgba(0,0,0,0.3); }
        .doi-dots { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 0.75rem; }
        .doi-dot { width: 12px; height: 12px; background: rgba(255,255,255,0.6); border-radius: 50%; cursor: pointer; transition: all 0.3s; }
        .doi-dot.active { background: white; transform: scale(1.4); }
        .doi-packages { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; max-width: 900px; margin: 0 auto; }
        .doi-package { background: #FFFFFF; padding: 2rem; border-radius: 20px; border: 2px solid #E5E7EB; text-align: center; transition: all 0.3s; }
        .doi-package:hover { transform: translateY(-5px); border-color: #FFD700; }
        .doi-package-icon { font-size: 3rem; margin-bottom: 1rem; }
        .doi-package-name { font-size: 1.5rem; font-weight: 800; color: #1A1A1A; margin-bottom: 0.5rem; }
        .doi-package-desc { color: #4B5563; font-size: 0.95rem; margin-bottom: 1rem; }
