    // Accounting Ledger System
    function syncSubLedgerToGeneralLedger(pettyEntries) {
        const generalLedger = [];
        let glId = 1;
        
        pettyEntries.forEach(entry => {
            if (entry.type === 'expense') {
                // Map sub-ledger category to general ledger account
                const accountMap = {
                    'food': '5101-001',
                    'maintenance': '5201-001',
                    'supplies': '5201-002',
                    'tour': '5301-001',
                    'utilities': '5401-001',
                    'labor': '5501-001',
                    'office': '5601-001',
                    'tax': '5701-001'
                };
                
                generalLedger.push({
                    id: `GL${String(glId++).padStart(3, '0')}`,
                    date: entry.date,
                    account: accountMap[entry.category] || '5901-001',
                    accountName: getCategoryName(entry.category),
                    description: entry.description,
                    debit: entry.amount,
                    credit: 0,
                    refId: entry.id,
                    refType: 'sub-ledger'
                });
            } else if (entry.type === 'income') {
                generalLedger.push({
                    id: `GL${String(glId++).padStart(3, '0')}`,
                    date: entry.date,
                    account: '1101-001',
                    accountName: 'เงินสด',
                    description: entry.description,
                    debit: 0,
                    credit: entry.amount,
                    refId: entry.id,
                    refType: 'sub-ledger'
                });
            }
        });
        
        return generalLedger;
    }

        const names = {

            'maintenance': 'ค่าใช้จ่ายซ่อมบำรุง',

            'utilities': 'ค่าใช้จ่ายสาธารณูปโภค',
            'labor': 'ค่าใช้จ่ายแรงงาน',
            'office': 'ค่าใช้จ่ายสำนักงาน',
            'tax': 'ภาษี',
            'capital': 'เงินทุน'
        };
        return names[category] || category;
    }
