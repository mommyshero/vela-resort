<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test - Vela Resort</title>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f5f5f5; }
        .box { background: white; padding: 2rem; border-radius: 12px; margin: 1rem 0; }
        button { padding: 1rem 2rem; font-size: 1.2rem; background: #FFD700; border: none; border-radius: 8px; cursor: pointer; margin: 0.5rem; }
        button:hover { background: #000; color: #FFD700; }
        #result { background: #000; color: #0f0; padding: 1rem; border-radius: 8px; font-family: monospace; min-height: 100px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 99999; }
        .modal.show { display: flex !important; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 3rem; border-radius: 16px; text-align: center; }
    </style>
</head>
<body>
    <h1>🧪 Simple Test</h1>
    
    <div class="box">
        <h3>Test 1: Button Click</h3>
        <button onclick="test1()">🔘 กดทดสอบ</button>
    </div>
    
    <div class="box">
        <h3>Test 2: Open Modal</h3>
        <button onclick="test2()">🪟 เปิด Modal</button>
        <button onclick="test3()">❌ ปิด Modal</button>
    </div>
    
    <div class="box">
        <h3>Result:</h3>
        <div id="result">Ready...</div>
    </div>
    
    <!-- Simple Modal -->
    <div id="simpleModal" class="modal">
        <div class="modal-content">
            <h2>✅ Modal เปิดได้!</h2>
            <p>ถ้าเห็นหน้านี้ = Modal ทำงานปกติ</p>
            <button onclick="test3()">ปิด</button>
        </div>
    </div>
    
    <script>
        function log(msg) {
            document.getElementById('result').innerHTML += '<div>' + msg + '</div>';
            console.log('[TEST]', msg);
        }
        
        function test1() {
            log('✅ Test 1: Button works!');
            alert('Button works!');
        }
        
        function test2() {
            log('🔵 Opening modal...');
            const modal = document.getElementById('simpleModal');
            if (!modal) {
                log('❌ Modal not found!');
                alert('Modal not found!');
                return;
            }
            log('✅ Modal element found');
            modal.classList.add('show');
            log('✅ Modal opened!');
        }
        
        function test3() {
            log('🔵 Closing modal...');
            const modal = document.getElementById('simpleModal');
            if (modal) {
                modal.classList.remove('show');
                log('✅ Modal closed');
            }
        }
        
        window.onload = function() {
            log('🟢 Page loaded successfully');
        };
    </script>
</body>
</html>
