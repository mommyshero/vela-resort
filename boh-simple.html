<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VELA BOH - Simple Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #2D2D2D 100%);
            min-height: 100vh;
        }
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .login-box h1 { color: #1A1A1A; margin-bottom: 2rem; }
        .login-box input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 1rem;
            background: #FFD700;
            color: #1A1A1A;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
        }
        .boh-container {
            display: none;
            padding: 2rem;
        }
        .boh-container.active { display: block; }
        .btn {
            padding: 1rem 2rem;
            margin: 0.5rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #3B82F6; color: white; }
        .btn-success { background: #10B981; color: white; }
        #console {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1A1A1A;
            color: #10B981;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            max-height: 300px;
            overflow-y: auto;
        }
        .log { margin-bottom: 0.25rem; }
        .log.error { color: #EF4444; }
        .log.success { color: #10B981; }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h1>🔐 VELA BOH Simple</h1>
            <form onsubmit="handleLogin(event)">
                <input type="text" id="username" placeholder="Username" value="Boss">
                <input type="password" id="password" placeholder="Password" value="5281">
                <button type="submit">🔑 Login</button>
            </form>
        </div>
    </div>

    <!-- BOH -->
    <div id="bohPage" class="boh-container">
        <h1 style="color: white; margin-bottom: 2rem;">✅ Login สำเร็จ!</h1>
        
        <div style="background: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem;">
            <h2>📥 Import/Sync Test</h2>
            <button class="btn btn-primary" onclick="importBookingsCSV()">📊 Import CSV</button>
            <button class="btn btn-success" onclick="syncFromWebsite()">🔄 Sync จากเว็บ</button>
        </div>

        <div style="background: white; padding: 2rem; border-radius: 12px;">
            <h2>📊 Summary Stats</h2>
            <div id="stats">Loading...</div>
        </div>
    </div>

    <!-- Console -->
    <div id="console">
        <h3 style="color: #FFD700; margin-bottom: 0.5rem;">🔍 Debug Console</h3>
        <div id="logs"></div>
    </div>

    <script>
        // State
        let bookings = [];

        // Debug logging
        function log(msg, type = 'info') {
            const logs = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = `[${time}] ${msg}`;
            logs.appendChild(div);
            logs.scrollTop = logs.scrollHeight;
            console.log(`[${type.toUpperCase()}]`, msg);
        }

        // Login
        function handleLogin(event) {
            event.preventDefault();
            log('🔵 handleLogin called', 'info');
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            log(`📝 Username: "${username}"`, 'info');
            log(`📝 Password: "${password}"`, 'info');
            
            if (username === 'Boss' && password === '5281') {
                log('✅ Credentials match!', 'success');
                
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('bohPage').classList.add('active');
                
                log('🎉 Login successful!', 'success');
                
                // Load data
                loadBookings();
            } else {
                log('❌ Credentials do not match!', 'error');
                alert('❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        }

        // Load bookings
        function loadBookings() {
            log('🔵 loadBookings called', 'info');
            
            bookings = JSON.parse(localStorage.getItem('vela_bookings')) || [];
            log(`📊 Loaded ${bookings.length} bookings`, 'success');
            
            // Update stats
            document.getElementById('stats').innerHTML = `
                <p><strong>Total Bookings:</strong> ${bookings.length}</p>
                <p><strong>Total Revenue:</strong> ฿${bookings.reduce((sum, b) => sum + (parseFloat(b.total) || 0), 0).toLocaleString()}</p>
            `;
        }

        // Import CSV
        function importBookingsCSV() {
            log('🔵 importBookingsCSV called', 'info');
            
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.csv';
            
            input.onchange = async (e) => {
                log('📥 File selected', 'info');
                
                const file = e.target.files[0];
                if (!file) return;
                
                log(`📄 File: ${file.name}`, 'info');
                
                try {
                    const text = await readFileAsText(file);
                    const lines = text.split('\n').filter(l => l.trim());
                    
                    log(`📊 Found ${lines.length} lines`, 'success');
                    alert(`✅ Found ${lines.length} lines in CSV!`);
                    
                } catch (error) {
                    log(`❌ Error: ${error.message}`, 'error');
                    alert(`❌ Error: ${error.message}`);
                }
            };
            
            input.click();
            log('✅ File picker opened', 'success');
        }

        function readFileAsText(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsText(file);
            });
        }

        // Sync from website
        function syncFromWebsite() {
            log('🔵 syncFromWebsite called', 'info');
            
            const webBookings = JSON.parse(localStorage.getItem('vela_bookings')) || [];
            const currentCount = bookings.length;
            const webCount = webBookings.length;
            
            log(`📊 Current: ${currentCount}, Web: ${webCount}`, 'info');
            
            if (webCount > currentCount) {
                log(`🔄 Found ${webCount - currentCount} new booking(s)`, 'success');
                bookings = webBookings;
                localStorage.setItem('vela_bookings', JSON.stringify(bookings));
                loadBookings();
                alert(`✅ Sync สำเร็จ! พบ ${webCount - currentCount} การจองใหม่`);
            } else {
                alert('ℹ️ ข้อมูลตรงกัน ไม่มีข้อมูลใหม่');
            }
        }

        // On load
        window.addEventListener('load', () => {
            log('🚀 Page loaded', 'info');
        });
    </script>
</body>
</html>
