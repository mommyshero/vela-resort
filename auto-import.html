    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #4B4B4B 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.3);
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            color: #1A1A1A;
            margin-bottom: 1rem;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #F3F4F6;
            border-top: 6px solid #FFD700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status {
            margin: 1.5rem 0;
            padding: 1rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
        }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-processing { background: #DBEAFE; color: #1E40AF; }
        .status-success { background: #D1FAE5; color: #065F46; }
        .status-error { background: #FEE2E2; color: #991B1B; }
        .progress-bar {
            height: 12px;
            background: #E5E7EB;
            border-radius: 6px;
            overflow: hidden;
            margin: 1.5rem 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFD700 0%, #10B981 100%);
            width: 0%;
            transition: width 0.5s ease;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }
        .stat-card {
            background: #F3F4F6;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: #1A1A1A;
        }
        .stat-label {
            color: #9CA3AF;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }
        .btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            margin: 0.5rem;
            text-decoration: none;
        }
        .btn-primary {
            background: #FFD700;
            color: #1A1A1A;
        }
        .btn-success {
            background: #10B981;
            color: white;
        }
        .hidden { display: none; }
    </style>
</head>

        // Auto Import Function

            const statusEl = document.getElementById('status');
            const progressFill = document.getElementById('progressFill');
            const statsEl = document.getElementById('stats');
            const resultEl = document.getElementById('result');
            const spinner = document.getElementById('spinner');

            try {
                // Step 1: Clear existing data
                statusEl.className = 'status status-processing';
                statusEl.innerHTML = '🗑️ กำลังล้างข้อมูลเก่า...';
                progressFill.style.width = '10%';
                await sleep(500);

                localStorage.clear();
                console.log('✅ Data cleared');

                // Step 2: Import Petty Cash
                statusEl.className = 'status status-processing';
                statusEl.innerHTML = '💰 กำลัง Import Petty Cash (81 รายการ)...';
                progressFill.style.width = '40%';
                await sleep(500);

                localStorage.setItem('vela_petty', JSON.stringify(pettyCashData));
                console.log('✅ Petty Cash imported:', pettyCashData.length);

                // Step 3: Import Bookings
                statusEl.className = 'status status-processing';
                statusEl.innerHTML = '📝 กำลัง Import Bookings (10 รายการ)...';
                progressFill.style.width = '70%';
                await sleep(500);

                localStorage.setItem('vela_bookings', JSON.stringify(bookingsData));
                console.log('✅ Bookings imported:', bookingsData.length);

                // Step 4: Generate General Ledger
                statusEl.className = 'status status-processing';
                statusEl.innerHTML = '📒 กำลังสร้าง General Ledger...';
                progressFill.style.width = '85%';
                await sleep(500);

                const generalLedger = pettyCashData.map(p => ({
                    id: 'GL-' + p.id,
                    date: p.date,
                    description: p.description,
                    debit: p.type === 'income' ? p.amount : 0,
                    credit: p.type === 'expense' ? p.amount : 0,
                    reference: p.id
                }));
                localStorage.setItem('vela_general_ledger', JSON.stringify(generalLedger));
                console.log('✅ General Ledger created:', generalLedger.length);

                // Step 5: Complete
                statusEl.className = 'status status-success';
                statusEl.innerHTML = '✅ Import สำเร็จ!';
                progressFill.style.width = '100%';
                spinner.style.display = 'none';

                // Show stats
                statsEl.classList.remove('hidden');
                document.getElementById('pettyCount').textContent = pettyCashData.length;
                document.getElementById('bookingCount').textContent = bookingsData.length;

                // Show result buttons
                resultEl.classList.remove('hidden');

                document.getElementById('title').textContent = '✅ Import สำเร็จ!';

                console.log('🎉 All data imported successfully!');

            } catch (error) {
                statusEl.className = 'status status-error';
                statusEl.innerHTML = '❌ เกิดข้อผิดพลาด: ' + error.message;
                spinner.style.display = 'none';
                console.error('❌ Error:', error);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Start import on page load
        window.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Auto Import started...');
            autoImport();
        });
    </script>
</body>
</html>
